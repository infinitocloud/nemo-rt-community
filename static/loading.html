<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeMo RT — Starting</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2376b900'/><path d='M8 20v-8M12 22V10M16 24V8M20 22V10M24 20v-8' stroke='white' stroke-width='2.5' stroke-linecap='round'/></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
}
.container { text-align: center; padding: 2rem; }
.logo {
    width: 64px;
    height: 64px;
    margin: 0 auto 1.5rem;
    animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
}
h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: #fff;
}
.subtitle {
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 2rem;
}
.spinner {
    width: 32px;
    height: 32px;
    margin: 0 auto;
    border: 3px solid #333;
    border-top-color: #76b900;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
    <svg class="logo" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="#76b900"/>
        <path d="M8 20v-8M12 22V10M16 24V8M20 22V10M24 20v-8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <h1>NeMo RT</h1>
    <p class="subtitle">Starting services, please wait...</p>
    <div class="spinner"></div>
</div>
<script>
async function poll() {
    try {
        const r = await fetch('/', {cache: 'no-store'});
        if (r.ok && !r.headers.get('x-loading')) {
            location.reload();
            return;
        }
    } catch {}
    setTimeout(poll, 3000);
}
poll();
</script>
</body>
</html>
